<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel Interativo de Visitas - OAB/SP</title>
<script src="data/dados.js"></script>
<style>
:root {
  --bg:#edf2f7; --ink:#122033; --muted:#667085; --line:#d7dee8; --card:#fff;
  --dark:#102334; --green:#16a34a; --red:#dc2626; --amber:#eab308; --blue:#2563eb;
  --shadow:0 16px 42px rgba(18,32,51,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#f8fafc,#e8eef7);color:var(--ink)}
header{height:86px;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;gap:14px;align-items:center}
.logo-img{width:112px;height:auto;display:block;object-fit:contain}
h1{margin:0;font-size:26px;letter-spacing:-.035em} .subtitle{color:var(--muted);font-weight:600;font-size:12px;margin-top:3px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,.file-label{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;padding:9px 12px;font-weight:850;font-size:12px;cursor:pointer}
button.primary{background:var(--dark);color:#fff;border-color:var(--dark)} input[type=file]{display:none}
main{height:calc(100vh - 86px);padding:0 22px 22px;display:grid;grid-template-columns:1.55fr .45fr;gap:18px}
.panel{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
.map-panel{padding:16px;display:flex;flex-direction:column;min-width:0}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:17px;padding:13px}
.kpi small{display:block;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.08em;font-size:10px}
.kpi strong{display:block;font-size:32px;line-height:1;margin-top:7px;letter-spacing:-.06em}
.map-stage{flex:1;border:1px solid var(--line);border-radius:22px;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;padding:18px}
.map-canvas{position:relative;display:inline-flex;align-items:center;justify-content:center;max-width:100%;max-height:100%;width:100%;height:100%}
.map-img{display:block;width:auto;height:auto;max-width:96%;max-height:96%;object-fit:contain;user-select:none}
.map-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:auto}
.region-shape{fill:rgba(255,255,255,0);stroke:rgba(16,35,52,0);stroke-width:4;cursor:pointer;transition:.18s}
.region-shape:hover{fill:rgba(255,255,255,.25);stroke:#102334;stroke-width:5}
.region-shape.active{fill:rgba(255,255,255,.35);stroke:#102334;stroke-width:7}
.badge{position:absolute;left:16px;top:16px;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:16px;padding:10px 12px;box-shadow:0 8px 22px rgba(18,32,51,.12);font-size:12px;color:var(--muted);font-weight:850}
.tooltip{position:fixed;display:none;background:#102334;color:#fff;padding:9px 11px;border-radius:12px;font-weight:850;font-size:12px;z-index:50;box-shadow:var(--shadow);pointer-events:none}
.side{display:flex;flex-direction:column;min-width:0}
.side-head{padding:16px 18px 11px;border-bottom:1px solid var(--line)} .side-head h2{margin:0;font-size:21px} .side-head p{margin:5px 0 0;color:var(--muted);font-size:12px;font-weight:650}
.details{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding:13px 18px;border-bottom:1px solid var(--line)}
.mini{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px} .mini span{display:block;color:var(--muted);font-size:10px;font-weight:950;text-transform:uppercase;letter-spacing:.07em} .mini b{display:block;font-size:24px;line-height:1;margin-top:5px;letter-spacing:-.06em}
.filters{padding:12px 18px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.filter-btn{font-size:11px;padding:8px} .filter-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)} .filter-btn.danger.active{background:var(--red);border-color:var(--red)} .filter-btn.success.active{background:var(--green);border-color:var(--green)}
.filters select{grid-column:1/-1;border:1px solid var(--line);border-radius:12px;padding:9px 11px;font-weight:850;color:var(--ink);background:#fff}
.search{padding:12px 18px;border-bottom:1px solid var(--line)} .search input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-weight:750}
.highlight-box{padding:12px 18px;border-bottom:1px solid var(--line);background:#fff7f7;display:none}
.highlight-title{font-weight:950;color:#991b1b;font-size:13px;margin-bottom:8px} .highlight-grid{display:flex;flex-wrap:wrap;gap:6px} .highlight-chip{background:#fff;border:1px solid #fecaca;color:#991b1b;border-radius:999px;padding:5px 8px;font-weight:850;font-size:11px}
.sub-list{padding:12px 18px;overflow:auto;min-height:0}
.reg-row,.sub-row{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:8px;cursor:pointer}
.reg-row:hover,.sub-row:hover{border-color:var(--dark)} .reg-row.active{background:#102334;color:#fff}
.reg-top{display:flex;justify-content:space-between;gap:10px;font-weight:950} .progress{height:8px;background:#edf1f6;border-radius:99px;overflow:hidden;margin-top:8px} .progress div{height:100%;background:linear-gradient(90deg,var(--red),var(--amber),var(--green))}
.group-title{font-weight:950;color:var(--dark);font-size:13px;margin:14px 0 8px;padding:8px 2px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between} .group-title span{color:var(--red);font-size:11px}
.sub-row{display:flex;align-items:center;justify-content:space-between;gap:8px} .sub-row.not-visited{border-color:#fecaca;background:#fff7f7} .sub-row.not-visited .sub-name{color:#991b1b}
.sub-name{font-weight:900} .sub-meta{font-size:11px;color:var(--muted);margin-top:3px}
.pill{border-radius:999px;padding:5px 8px;font-weight:950;font-size:10px;color:#fff;white-space:nowrap} .pill.vis{background:var(--green)} .pill.not{background:var(--red)} .pill.both{background:var(--blue)}
.note{padding:11px 18px;color:var(--muted);font-size:11px;border-top:1px solid var(--line);font-weight:650}
.tv header{display:none} .tv main{height:100vh;padding:16px;grid-template-columns:1.58fr .42fr} .tv .panel{border-radius:20px}
@media(max-width:1100px){main{grid-template-columns:1fr;height:auto}.kpis{grid-template-columns:repeat(2,1fr)}}


.sub-row{flex-direction:column;align-items:stretch}
.sub-main{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sub-options{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);gap:8px}
.sub-row.expanded .sub-options{display:grid;grid-template-columns:1fr 1fr}
.option-btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;padding:9px 10px;font-weight:900;font-size:11px;cursor:pointer}
.option-btn.active.pres{background:var(--green);border-color:var(--green);color:#fff}
.option-btn.active.vp{background:var(--blue);border-color:var(--blue);color:#fff}


.filter-btn.back{display:block;background:#fff;border-color:var(--dark);color:var(--dark)}


</style>
</head>
<body>
<header>
  <div class="brand"><img class="logo-img" src="assets/OAB-SP-logo-preto.png" alt="OAB São Paulo"><div><h1>Painel de Visitas às Subseções</h1><div class="subtitle">Dr. Leonardo Sica | Mapa da Divisão Administrativa da OAB/SP</div></div></div>
  <div class="actions">
    <button onclick="showGeneral()">Ver Estado inteiro</button>
    <button onclick="exportCSV()">Exportar CSV</button>
    <label class="file-label">Importar CSV<input type="file" accept=".csv" onchange="importCSV(event)"></label>
    <button class="primary" onclick="toggleTv()">Modo TV</button>
  </div>
</header>

<main>
<section class="panel map-panel">
  <div class="kpis">
    <div class="kpi"><small>Total de subseções</small><strong id="kTotal">—</strong></div>
    <div class="kpi"><small>Visitadas</small><strong id="kVisited">—</strong></div>
    <div class="kpi"><small>Vice-Presidente</small><strong id="kVP">—</strong></div>
    <div class="kpi"><small>Ambas</small><strong id="kBoth">—</strong></div>
    <div class="kpi"><small>Não visitadas</small><strong id="kNot">—</strong></div>
  </div>
  <div class="map-stage">
    
    <div class="map-canvas">
      <img id="mapImage" class="map-img" src="assets/maps/mapa_geral.png" alt="Mapa de São Paulo por Divisão Administrativa">
      
      <div class="badge" id="mapBadge" style="display:none"></div>
    </div>
  </div>
</section>

<aside class="panel side">
  <div class="side-head"><h2 id="sideTitle">Estado de São Paulo</h2><p id="sideText">Selecione uma região na lista lateral.</p></div>
  <div class="details">
    <div class="mini"><span>Região</span><b id="dRegion">21</b></div>
    <div class="mini"><span>Subseções</span><b id="dTotal">—</b></div>
    <div class="mini"><span>Visitadas</span><b id="dVisited">—</b></div>
    <div class="mini"><span>Vice-Pres.</span><b id="dVP">—</b></div>
    <div class="mini"><span>Ambas</span><b id="dBoth">—</b></div>
    <div class="mini"><span>Cobertura</span><b id="dPct">—</b></div>
  </div>
  <div class="filters">
    <button id="filterAll" class="filter-btn active" onclick="setFilter('todas')">Todas</button>
    <button id="filterNot" class="filter-btn danger" onclick="setFilter('nao')">Não visitadas</button>
    <button id="filterVisited" class="filter-btn success" onclick="setFilter('visitadas')">Visitadas</button>
    <button id="btnVoltarRegiao" class="filter-btn back" onclick="showGeneral()">← Voltar</button>
    <select id="sortMode" onchange="renderSide()">
      <option value="regiao">Separar por Região Administrativa</option>
      <option value="alfabetica">Ordem Alfabética</option>
    </select>
  </div>
  <div class="search"><input id="search" placeholder="Buscar subseção..." oninput="renderSide()"></div>
  <div class="sub-list" id="subList"></div>
  
</aside>
</main>


<script>
const REGION_POLYGONS = {"1": "655,435 700,425 730,450 735,500 705,530 660,515 640,475", "2": "595,560 700,575 805,565 855,535 875,565 820,610 705,625 600,605", "3": "475,375 535,365 575,400 555,455 495,465 455,430", "4": "375,360 450,350 505,390 480,440 405,445 350,405", "5": "450,295 515,285 555,320 535,365 470,365 430,330", "6": "485,220 590,205 660,255 625,320 525,330 460,285", "7": "575,330 665,325 720,375 690,445 610,440 550,390", "8": "545,455 625,450 675,505 650,570 570,560 520,510", "9": "650,245 780,245 870,315 835,405 710,390 620,325", "10": "700,455 770,445 830,485 810,545 735,550 680,505", "11": "795,390 955,370 1020,440 985,545 835,530 800,465", "12": "300,300 425,290 500,350 470,405 350,405 265,355", "13": "350,150 500,135 590,200 530,270 385,270 305,215", "14": "365,460 500,455 575,525 535,615 390,610 315,540", "15": "220,390 350,370 420,435 380,520 250,530 175,470", "16": "190,190 340,175 420,235 365,320 225,325 145,265", "17": "115,335 240,315 320,370 280,465 135,480 65,415", "18": "135,260 265,245 345,305 305,385 165,395 85,335", "19": "630,520 690,515 725,550 705,610 640,610 600,565", "20": "520,515 630,505 680,565 645,640 535,640 480,580", "21": "250,520 370,510 430,580 385,665 250,660 185,590"};
let regions = window.OAB_DATA.regions;
const SUPABASE_URL = "https://vreylwrxmczdwueoznti.supabase.co/rest/v1";
const SUPABASE_KEY = "sb_publishable_C01sEooTDzpcd1gQkmZPsA_LvmGCfMv";
let records = window.OAB_DATA.records || [];
let usingSupabase = true;
let currentRegion = null;
let activeFilter = "todas";

function regionStats(regionName) {
  const arr = records.filter(r => r.regiao === regionName);
  const presidente = arr.filter(r => r.presidente === "Sim").length;
  const vp = arr.filter(r => r.vp === "Sim").length;
  const both = arr.filter(r => r.presidente === "Sim" && r.vp === "Sim").length;
  const visited = arr.filter(r => r.presidente === "Sim" || r.vp === "Sim").length;
  const not = arr.filter(r => r.presidente !== "Sim" && r.vp !== "Sim").length;
  return { total: arr.length, visited, presidente, vp, both, not, pct: arr.length ? Math.round(visited/arr.length*100) : 0 };
}
function overall() {
  const total = records.length;
  const presidente = records.filter(r => r.presidente === "Sim").length;
  const vp = records.filter(r => r.vp === "Sim").length;
  const both = records.filter(r => r.presidente === "Sim" && r.vp === "Sim").length;
  const visited = records.filter(r => r.presidente === "Sim" || r.vp === "Sim").length;
  const not = records.filter(r => r.presidente !== "Sim" && r.vp !== "Sim").length;
  return { total, visited, presidente, vp, both, not, pct: total ? Math.round(visited/total*100) : 0 };
}
function renderKpis() {
  const o = overall();
  if(typeof kTotal !== "undefined") kTotal.textContent = o.total;
  if(typeof kVisited !== "undefined") kVisited.textContent = o.visited;
  if(typeof kVP !== "undefined") kVP.textContent = o.vp;
  if(typeof kBoth !== "undefined") kBoth.textContent = o.both;
  if(typeof kNot !== "undefined") kNot.textContent = o.not;
  if(typeof kPct !== "undefined") kPct.textContent = o.pct + "%";
}
function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
  if(filter === "todas") filterAll.classList.add("active");
  if(filter === "nao") filterNot.classList.add("active");
  if(filter === "visitadas") filterVisited.classList.add("active");
  renderSide();
}
function statusPill(r) {
  if(r.presidente === "Sim" && r.vp === "Sim") return '<span class="pill both">VP + Pres.</span>';
  if(r.presidente === "Sim" || r.vp === "Sim") return '<span class="pill vis">Visitada</span>';
  return '<span class="pill not">Não visitada</span>';
}
function pctFill(pct) {
  if(pct >= 80) return "rgba(22,163,74,.22)";
  if(pct >= 50) return "rgba(234,179,8,.22)";
  return "rgba(220,38,38,.22)";
}
function renderOverlay(){}
function selectRegion(numero) {
  const reg = regions.find(r => Number(r.numero) === Number(numero));
  currentRegion = reg.name;
  mapImage.src = reg.map_page;
  mapBadge.textContent = `${reg.name} • mapa ampliado`;
  renderOverlay();
  updateBackButton();
  renderSide();
}
function showGeneral() {
  currentRegion = null;
  mapImage.src = "assets/maps/mapa_geral.png";
  mapBadge.textContent = "Mapa da Divisão Administrativa da OAB/SP";
  renderOverlay();
  updateBackButton();
  renderSide();
}

function updateBackButton(){
  const btn = document.getElementById("btnVoltarRegiao");
  if(!btn) return;
  btn.classList.toggle("visible", !!currentRegion);
}

function renderSide() {
  renderKpis();
  updateBackButton();
  const q = search.value.trim().toLowerCase();
  const sortMode = document.getElementById("sortMode").value;

  let arr = currentRegion ? records.filter(r => r.regiao === currentRegion) : records;
  if(activeFilter === "nao") arr = arr.filter(r => r.presidente !== "Sim" && r.vp !== "Sim");
  if(activeFilter === "visitadas") arr = arr.filter(r => r.presidente === "Sim" || r.vp === "Sim");
  if(q) arr = arr.filter(r => r.subsecao.toLowerCase().includes(q) || r.regiao.toLowerCase().includes(q));

  if(sortMode === "alfabetica") arr.sort((a,b)=>a.subsecao.localeCompare(b.subsecao,"pt-BR"));
  else arr.sort((a,b)=>a.numero_regiao-b.numero_regiao || a.subsecao.localeCompare(b.subsecao,"pt-BR"));

  const base = currentRegion ? regionStats(currentRegion) : overall();
  sideTitle.textContent = currentRegion || "Estado de São Paulo";
  sideText.textContent = currentRegion ? "Subseções da região selecionada." : "Selecione uma região na lista lateral.";
  dRegion.textContent = currentRegion ? currentRegion.split("ª")[0] : "21";
  dTotal.textContent = base.total; dVisited.textContent = base.visited; dVP.textContent = base.vp; dBoth.textContent = base.both; dPct.textContent = base.pct + "%";

  subList.innerHTML = "";
  if(!currentRegion && !q && activeFilter === "todas") {
    regions.forEach(reg => {
      const st = regionStats(reg.name);
      const div = document.createElement("div");
      div.className = "reg-row";
      div.onclick = () => selectRegion(reg.numero);
      div.innerHTML = `<div class="reg-top"><span>${reg.name}</span><span>${st.visited}/${st.total} (${st.pct}%) • VP ${st.vp}</span></div><div class="progress"><div style="width:${st.pct}%"></div></div>`;
      subList.appendChild(div);
    });
    return;
  }

  let lastRegion = "";
  arr.forEach(r => {
    if(sortMode === "regiao" && r.regiao !== lastRegion && !currentRegion) {
      lastRegion = r.regiao;
      const gs = regionStats(r.regiao);
      const group = document.createElement("div");
      group.className = "group-title";
      group.innerHTML = `${r.regiao} <span>${gs.not} não visitadas</span>`;
      subList.appendChild(group);
    }
    const div = document.createElement("div");
    div.className = "sub-row" + ((r.presidente !== "Sim" && r.vp !== "Sim") ? " not-visited" : "") + (expandedSubsecao === r.subsecao ? " expanded" : "");
    div.onclick = () => toggleExpandSubsecao(r.subsecao);
    div.innerHTML = `
      <div class="sub-main">
        <div>
          <div class="sub-name">${r.subsecao}</div>
          <div class="sub-meta">${r.regiao} • Presidente: ${r.presidente} • VP: ${r.vp}</div>
        </div>
        ${statusPill(r)}
      </div>
      <div class="sub-options" onclick="event.stopPropagation()">
        <button class="option-btn pres ${r.presidente === "Sim" ? "active" : ""}" onclick="setVisitOption('${r.subsecao.replace(/'/g, "\'")}', 'presidente', ${r.presidente !== "Sim"})">
          Visitou como Presidente
        </button>
        <button class="option-btn vp ${r.vp === "Sim" ? "active" : ""}" onclick="setVisitOption('${r.subsecao.replace(/'/g, "\'")}', 'vp', ${r.vp !== "Sim"})">
          Visitou como VP
        </button>
      </div>`;
    subList.appendChild(div);
  });
  if(arr.length === 0) {
    const empty = document.createElement("div");
    empty.className = "sub-row";
    empty.innerHTML = '<div><div class="sub-name">Nenhuma subseção encontrada</div><div class="sub-meta">Altere o filtro ou a busca.</div></div>';
    subList.appendChild(empty);
  }
}


let expandedSubsecao = null;

function toggleExpandSubsecao(subsecao){
  expandedSubsecao = expandedSubsecao === subsecao ? null : subsecao;
  renderSide();
}

function setVisitOption(subsecao, field, value){
  const r = records.find(x => x.subsecao === subsecao);
  if(!r) return;

  r[field] = value ? "Sim" : "Não";

  if(r.presidente === "Sim" && r.vp === "Sim"){
    r.classificacao = "VP + Presidente";
  } else if(r.presidente === "Sim" || r.vp === "Sim"){
    r.classificacao = "Visitada";
  } else {
    r.classificacao = "Não visitada";
  }

  saveRecordToSupabase(r);
  renderSide();
}
function exportCSV() {
  const header = ["regiao","numero_regiao","subsecao","vp","presidente","classificacao"];
  const csv = [header.join(";")].concat(records.map(r => header.map(h => `"${String(r[h] ?? "").replaceAll('"','""')}"`).join(";"))).join("\n");
  const blob = new Blob(["\ufeff" + csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "subsecoes_visitas_oabsp.csv"; a.click();
}
function importCSV(ev) {
  alert("Com o Supabase ativo, a importação de CSV deve ser feita diretamente no Supabase para evitar divergência de dados.");
  ev.target.value = "";
}

function toBool(value){
  return value === true || value === "true" || value === "TRUE" || value === "Sim";
}

function fromBool(value){
  return toBool(value) ? "Sim" : "Não";
}

function normalizeRecordFromDb(row){
  return {
    id: row.id,
    regiao: row.regiao,
    numero_regiao: row.numero_regiao,
    subsecao: row.subsecao,
    presidente: fromBool(row.presidente),
    vp: fromBool(row.vp),
    classificacao: row.classificacao || "Não visitada",
    updated_at: row.updated_at
  };
}

function normalizeRecordForDb(r){
  return {
    presidente: r.presidente === "Sim",
    vp: r.vp === "Sim",
    classificacao: r.classificacao,
    updated_at: new Date().toISOString()
  };
}

async function loadFromSupabase(){
  try{
    const res = await fetch(`${SUPABASE_URL}/subsecoes?select=*&order=numero_regiao.asc,subsecao.asc`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });

    if(!res.ok){
      throw new Error(await res.text());
    }

    const rows = await res.json();
    if(rows && rows.length){
      records = rows.map(normalizeRecordFromDb);
    }

    renderKpis();
    renderSide();
  }catch(error){
    console.error("Erro ao carregar dados do Supabase:", error);
    alert("Não foi possível carregar os dados do Supabase. O painel será aberto com os dados locais.");
    renderKpis();
    renderSide();
  }
}

async function saveRecordToSupabase(r){
  if(!r.id){
    console.warn("Registro sem ID, não foi possível salvar no Supabase:", r);
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/subsecoes?id=eq.${r.id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(normalizeRecordForDb(r))
  });

  if(!res.ok){
    const msg = await res.text();
    console.error("Erro ao salvar no Supabase:", msg);
    alert("Não foi possível salvar a alteração no Supabase. Tente novamente.");
  }
}

function toggleTv() {
  document.body.classList.toggle("tv");
  if(document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.();
}
renderKpis();
renderOverlay();
loadFromSupabase();
</script>
